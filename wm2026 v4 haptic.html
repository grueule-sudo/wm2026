  0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.6); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.4); }
}
@keyframes dotBounce {
  0%,100% { transform: scale(1); }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#F5F5F7;color:#1A1A2E;min-height:100vh}

/* HEADER */
.hdr{background:#fff;padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #E5E5EA;box-shadow:0 1px 8px rgba(0,0,0,0.06)}

.live{background:#34C759;color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;border-radius:6px;padding:3px 8px}

/* WHEEL — pure CSS divs */
.wheel-wrap{background:#fff;border-bottom:1px solid #E5E5EA;padding:24px 0 16px;display:flex;flex-direction:column;align-items:center}
.wheel-hint{font-size:11px;color:#8E8E93;letter-spacing:2px;font-weight:600;margin-bottom:18px}
.wheel{position:relative;width:240px;height:240px;border-radius:50%;touch-action:none;user-select:none}
.wheel-bg{position:absolute;inset:0;border-radius:50%;background:#EBEBF0;box-shadow:0 4px 20px rgba(0,0,0,0.10)}
/* Each segment is a rotated half-circle clip */
.seg-wrap{position:absolute;width:100%;height:100%;border-radius:50%}
.seg{
  position:absolute;top:0;left:50%;
  width:50%;height:50%;
  transform-origin:0% 100%;
  overflow:hidden;
}
.seg-inner{
  position:absolute;top:0;left:-100%;
  width:200%;height:200%;
  border-radius:50%;
  background:#EBEBF0;
  transition:background .2s;
}
/* Center hole */
.wheel-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:96px;height:96px;border-radius:50%;
  background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.10);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;pointer-events:none
}
.wheel-center-label{font-size:11px;font-weight:800;letter-spacing:1px}
/* Pointer triangle at top */
.wheel-pointer{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:7px solid transparent;
  border-right:7px solid transparent;
  border-bottom:13px solid #2563EB;
  z-index:30;transition:border-bottom-color .2s
}
/* Emoji labels on the ring */
.seg-emoji{
  position:absolute;font-size:20px;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:15;
  transition:font-size .15s;
}

/* DOTS */
.dots{display:flex;justify-content:center;gap:8px;padding:10px 0;background:#fff;border-bottom:1px solid #E5E5EA}
.dot{width:8px;height:8px;border-radius:50%;background:#E0E0E5;transition:background .2s}

// ── WHEEL — pure CSS div approach ────────────────────────────────────────────
const wheelEl=document.getElementById('wheel');
const D=240, R=D/2, R_OUT=120, R_IN=48, R_MID=(R_OUT+R_IN)/2;

// Build segments as wedge-shaped divs using clip-path polygon
function buildWheel(){
  wheelEl.querySelectorAll('.wseg,.wemoji').forEach(e=>e.remove());
  const step=360/N;
  TABS.forEach((tab,i)=>{
    const midDeg = i*step; // angle from top, clockwise
    const halfStep = step/2;

    // Wedge using CSS clip-path on a full circle div
    // We create each segment as an absolutely positioned div with clip-path
    const seg=document.createElement('div');
    seg.className='wseg';
    seg.dataset.idx=i;

    // Convert to clip-path polygon for a pie slice
    // Center at 50%,50%, two arc points + center
    const pts=[];
    pts.push('50% 50%');
    // Generate arc points
    const arcSteps=8;
    for(let s=0;s<=arcSteps;s++){
      const a=((midDeg-halfStep + s*(step/arcSteps))-90)*Math.PI/180;
      const x=50+50*Math.cos(a);
      const y=50+50*Math.sin(a);
      pts.push(x.toFixed(2)+'% '+y.toFixed(2)+'%');
    }

    seg.style.cssText=`
      position:absolute;inset:0;border-radius:50%;
      background:${i===activeIdx?tab.col:'#DDDDE2'};
      clip-path:polygon(${pts.join(',')});
      transition:background .2s;cursor:pointer;
      border:none;
    `;
    wheelEl.insertBefore(seg,wheelEl.querySelector('.wheel-center'));

    // Emoji at midpoint on ring
    const aMid=(midDeg-90)*Math.PI/180;
    const ex=R+R_MID*Math.cos(aMid);
    const ey=R+R_MID*Math.sin(aMid);
    const em=document.createElement('div');
    em.className='wemoji';
    em.style.cssText=`
      position:absolute;
      left:${ex}px;top:${ey}px;
      transform:translate(-50%,-50%);
      font-size:${i===activeIdx?22:17}px;
      pointer-events:none;z-index:15;
      transition:font-size .15s;
    `;
    em.textContent=tab.emoji;
    wheelEl.insertBefore(em,wheelEl.querySelector('.wheel-center'));
  });

  // Update center label & pointer color
  document.getElementById('wlabel').textContent=TABS[activeIdx].label.toUpperCase();
  document.getElementById('wlabel').style.color=TABS[activeIdx].col;
  document.getElementById('ptr').style.borderBottomColor=TABS[activeIdx].col;

  // Dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.style.background=i===activeIdx?TABS[activeIdx].col:'#E0E0E5';
  });
}

// ── HAPTIC FEEDBACK ──────────────────────────────────────────────────────────
function hapticClick() {
  // Native haptic on real device
  if (navigator.vibrate) navigator.vibrate(8);
  // Visual click ring animation
  const ring = document.getElementById('clickRing');
  ring.style.transition = 'none';
  ring.style.opacity = '1';
  ring.style.transform = 'translate(-50%,-50%) scale(0.6)';
  ring.style.borderColor = TABS[activeIdx].col;
  requestAnimationFrame(() => {
    ring.style.transition = 'opacity 0.3s ease-out, transform 0.3s ease-out';
    ring.style.opacity = '0';
    ring.style.transform = 'translate(-50%,-50%) scale(1.5)';
  });
}

function hapticSegmentChange(newIdx) {
  activeIdx = newIdx;
  // Bounce the active dot
  const dots = document.querySelectorAll('.dot');
  if (dots[activeIdx]) {
    dots[activeIdx].classList.remove('dot-bounce');
    void dots[activeIdx].offsetWidth; // reflow
    dots[activeIdx].classList.add('dot-bounce');
    setTimeout(() => dots[activeIdx].classList.remove('dot-bounce'), 250);
  }
  hapticClick();
  buildWheel();
  renderContent();
}

// Drag rotation state
let dragging=false, dragStartAngle=0, dragStartSeg=0, totalDrag=0;

function angleToCenterFromEvent(e){
  const r=wheelEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const px=(e.touches?e.touches[0].clientX:e.clientX)-cx;
  const py=(e.touches?e.touches[0].clientY:e.clientY)-cy;
  return Math.atan2(py,px)*180/Math.PI;
}

wheelEl.addEventListener('mousedown',e=>{
  const r=wheelEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const px=e.clientX-cx, py=e.clientY-cy;
  const dist=Math.sqrt(px*px+py*py);
  if(dist<R_IN) return; // center — ignore
  dragging=true; totalDrag=0;
  dragStartAngle=angleToCenterFromEvent(e);
  dragStartSeg=activeIdx;
});
wheelEl.addEventListener('touchstart',e=>{
  const r=wheelEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const px=e.touches[0].clientX-cx, py=e.touches[0].clientY-cy;
  const dist=Math.sqrt(px*px+py*py);
  if(dist<R_IN) return;
  dragging=true; totalDrag=0;
  dragStartAngle=angleToCenterFromEvent(e);
  dragStartSeg=activeIdx;
},{passive:true});

window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const cur=angleToCenterFromEvent(e);
  const diff=cur-dragStartAngle;
  totalDrag+=Math.abs(diff);
  const step=360/N;
  const shifted=Math.round(diff/step);
  let ni=((dragStartSeg-shifted)%N+N)%N;
  if(ni!==activeIdx){ hapticSegmentChange(ni); }
});
window.addEventListener('touchmove',e=>{
  if(!dragging)return;
  const cur=angleToCenterFromEvent(e);
  const diff=cur-dragStartAngle;
  const step=360/N;
  const shifted=Math.round(diff/step);
  let ni=((dragStartSeg-shifted)%N+N)%N;
  if(ni!==activeIdx){ hapticSegmentChange(ni); }
},{passive:true});

window.addEventListener('mouseup',()=>{dragging=false;});
window.addEventListener('touchend',()=>{dragging=false;});

// Tap on segment
wheelEl.addEventListener('click',e=>{
  if(totalDrag>10) return; // was a drag
  const seg=e.target.closest('.wseg');
  if(!seg) return;
  const i=parseInt(seg.dataset.idx);
  if(i!==activeIdx){ hapticSegmentChange(i); } else { hapticClick(); }
});

// ── STANDINGS ────────────────────────────────────────────────────────────────
function standings(gd){
  const t={};
  gd.teams.forEach(n=>t[n]={sp:0,tor:0,geg:0,pkt:0});
  (gd.matches||[]).forEach(m=>{
    if(!m.played)return;
    const h=t[m.home],a=t[m.away];
    if(!h||!a)return;
    h.sp++;a.sp++;h.tor+=m.sh;h.geg+=m.sa;a.tor+=m.sa;a.geg+=m.sh;
    if(m.sh>m.sa)h.pkt+=3;else if(m.sh<m.sa)a.pkt+=3;else{h.pkt++;a.pkt++;}
  });
  return Object.entries(t).map(([n,s])=>({n,...s,d:s.tor-s.geg}))
    .sort((a,b)=>b.pkt-a.pkt||b.d-a.d||b.tor-a.tor);
}

// ── RENDER TABS ───────────────────────────────────────────────────────────────
function renderContent(){
  const c=document.getElementById('content');
  const id=TABS[activeIdx].id;
  if(id==='dfb')c.innerHTML=rDFB();
  else if(id==='heute')c.innerHTML=rHeute();
  else if(id==='groups')c.innerHTML=rGroups();
  else if(id==='results')c.innerHTML=rResults();
  else if(id==='analyse')c.innerHTML=rAnalyse();
  c.querySelectorAll('.pgbtn').forEach(b=>b.addEventListener('click',()=>{grpPage=+b.dataset.p;renderContent();}));
  c.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>{anaTopic=b.dataset.t;renderContent();}));
}

  <div class="grid2">
    ${last?`<div class="tile tile-blue">
      <div class="tile-lbl">LETZTES · ${last.date}</div>
      <div class="score-big">${F[last.home]} <span>${last.sh}</span><span class="score-sep">–</span><span>${last.sa}</span> ${F[last.away]}</div>
      ${last.sc?`<div class="scorers">⚽ ${last.sc}</div>`:''}
    </div>`:''}
    ${next?`<div class="tile tile-yellow">
      <div class="tile-lbl tile-lbl-y">NÄCHSTES · ${next.date}</div>
      <div style="font-size:20px;margin:4px 0">${F[next.home]} <span style="font-size:12px;color:#999">vs</span> ${F[next.away]}</div>
      <div style="font-size:12px;font-weight:700">${next.home} – ${next.away}</div>
      ${next.venue?`<div style="font-size:11px;color:#8E8E93;margin-top:2px">📍 ${next.venue}</div>`:''}
    </div>`:''}
  </div>
  <div class="card-ttl">TABELLE GRUPPE E</div>
  <table class="tbl">
    <thead><tr><th>#</th><th>Team</th><th>Sp</th><th>T:G</th><th>Pkt</th></tr></thead>
    <tbody>${s.map((t,i)=>`<tr class="${i<2?'adv':''}">
      <td class="${i<2?'q':''}" style="font-weight:700">${i+1}</td>
      <td><span style="margin-right:4px">${F[t.n]||'🏳'}</span><span class="${t.n==='Deutschland'?'dfb':''}">${t.n}</span></td>
      <td>${t.sp}</td><td>${t.tor}:${t.geg}</td><td class="pkt">${t.pkt}</td>
    </tr>`).join('')}</tbody>
  </table>
  <div class="qualify-note">● = Weiterkommen sicher</div>
</div>`;
}

function rHeute(){

    const lv=m.status==='LIVE',dn=m.status==='FT';
    return`<div>
      <div class="match-meta">
        <span class="${lv?'s-live':'s-done'}">${lv?'● LIVE':'Beendet'}</span>
        <span><span class="gbadge">GRP ${m.group}</span> <span style="font-size:11px;color:#8E8E93">📍 ${m.venue}</span></span>
      </div>
      <div class="match-row">
        <div class="team"><span class="flag">${F[m.home]||'🏳'}</span>${m.home}</div>
        <div class="mscore ${lv?'live':dn?'':'soon'}">${dn||lv?(m.sh!==null?m.sh+' : '+m.sa:'– : –'):m.time+' Uhr'}</div>
        <div class="team r">${m.away}<span class="flag">${F[m.away]||'🏳'}</span></div>
      </div>
    </div>`;
  }).join('');
  const inj=`
    ${INJ.absent.map(p=>`<div class="inj r"><span>🔴</span><div><div class="inj-n">${p.name}<span class="inj-p">${p.pos}</span></div><div class="inj-r">${p.reason}</div></div></div>`).join('')}
    ${INJ.watch.map(p=>`<div class="inj y"><span>🟡</span><div><div class="inj-n">${p.name}<span class="inj-p">${p.pos}</span></div><div class="inj-r">${p.reason}</div></div></div>`).join('')}
    ${INJ.fit.map(p=>`<div class="inj g"><span>🟢</span><div><div class="inj-n">${p.name}<span class="inj-p">${p.pos}</span></div><div class="inj-r">${p.reason}</div></div></div>`).join('')}`;
  return`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div><div style="font-weight:800;font-size:16px">Heute · 18.06.2026</div>
    <div style="font-size:11px;color:#8E8E93;margin-top:2px">4 Spiele · Alle Zeiten MEZ</div></div>
    <div class="spieltag">SPIELTAG 7–8</div>
  </div>${ms}</div>
  <div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div><div class="card-ttl" style="margin-bottom:2px">🏥 DFB VERLETZUNGS-UPDATE</div>
    <div style="font-size:11px;color:#8E8E93">${INJ.updated}</div></div>
    <a href="https://www.sportschau.de/fussball/fifa-wm-2026/deutsches-team" target="_blank" class="ext">↗ Sportschau</a>
  </div>${inj}</div>`;
}

function rGroups(){
  const keys=Object.keys(GRP);
  const pg=keys.slice(grpPage*6,(grpPage+1)*6);
  return pg.map(gk=>{
    const s=standings(GRP[gk]);
    return`<div class="card"><div class="grp-hdr">GRUPPE ${gk}</div>
    <table class="tbl">
      <thead><tr><th>#</th><th>Team</th><th>Sp</th><th>T</th><th>Pkt</th></tr></thead>
      <tbody>${s.map((t,i)=>`<tr class="${i<2?'adv':''}">
        <td class="${i<2?'q':''}" style="font-weight:700">${i+1}</td>
        <td><span style="margin-right:4px">${F[t.n]||'🏳'}</span><span class="${t.n==='Deutschland'?'dfb':''}">${t.n}</span></td>
        <td>${t.sp}</td><td>${t.tor}:${t.geg}</td><td class="pkt">${t.pkt}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }).join('')+`<div class="pgbtns">
    <button class="pgbtn ${grpPage===0?'on':''}" data-p="0">A – F</button>
    <button class="pgbtn ${grpPage===1?'on':''}" data-p="1">G – L</button>
  </div>`;
}

function rResults(){
  const all=Object.entries(GRP).flatMap(([gk,gd])=>(gd.matches||[]).filter(m=>m.played).map(m=>({...m,gk})));
  if(!all.length)return`<div class="card"><p style="color:#8E8E93;text-align:center;padding:20px">Noch keine Ergebnisse.</p></div>`;
  return`<div class="card"><div class="card-ttl">⚽ ALLE ERGEBNISSE</div>
  ${all.map(m=>`<div class="match-meta"><span class="s-done">Beendet · ${m.date}</span><span class="gbadge">GRP ${m.gk}</span></div>
    <div class="match-row">
      <div class="team"><span class="flag">${F[m.home]||'🏳'}</span>${m.home}</div>
      <div class="mscore">${m.sh} : ${m.sa}</div>
      <div class="team r">${m.away}<span class="flag">${F[m.away]||'🏳'}</span></div>
    </div>`).join('')}</div>`;
}

function rAnalyse(){
  const topics=Object.keys(ANA);
  const items=ANA[anaTopic]||[];
  return`<div class="card"><div class="card-ttl">📋 ANALYSE</div>
  <div class="pills">${topics.map(t=>`<button class="pill ${t===anaTopic?'on':''}" data-t="${t}">${t}</button>`).join('')}</div>
  ${items.map(it=>`<div class="aitem"><div class="albl">${it.l}</div><div class="atxt">${it.t}</div></div>`).join('')}</div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
const dotsEl=document.getElementById('dots');
TABS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);});
buildWheel();
renderContent();
</script>
<script>
// PWA: Register service worker for offline use
if ('serviceWorker' in navigator) {
  // Inline SW via blob — works from any origin
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
